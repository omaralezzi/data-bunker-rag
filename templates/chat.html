<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>RAG Chat</title>

  <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon.png') }}?v=3">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='favicon.png') }}?v=3">
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.png') }}?v=3">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='favicon.png') }}?v=3">

  <link rel="stylesheet" href="{{ url_for('static', filename='chat.css') }}">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <button id="newChatBtn" class="new-chat-btn">+ New RAG Chat</button>

      <div id="chatList" class="chat-list"></div>

      <div class="sidebar-footer">
        <div class="brand-box">
          <img src="/static/logo.png" alt="Data Bunker Logo" class="brand-logo" />
          <div class="brand-sub">RAG CHAT</div>
        </div>

        <div class="sidebar-actions">
          <button class="side-btn" id="domainsBtn">Domains</button>
          <button class="side-btn" id="indexStatusBtn">Index Status</button>
          <button class="side-btn danger" id="deleteChatBtn">Delete Chat</button>
        </div>
      </div>
    </aside>

    <main class="main-panel">
      <header class="topbar">
        <div class="topbar-title">RAG Chat</div>
        <div class="topbar-controls">
          <select id="answerLanguageSelect">
            <option value="auto">Auto Language</option>
            <option value="ar" selected>Arabic Answer</option>
            <option value="en">English Answer</option>
          </select>

          <select id="domainSelect">
            <option value="all">all</option>
            <option value="water">water</option>
            <option value="medical">medical</option>
            <option value="power">power</option>
            <option value="food">food</option>
            <option value="prepping">prepping</option>
          </select>

          <select id="limitSelect">
            <option value="3">Top K: 3</option>
            <option value="5" selected>Top K: 5</option>
            <option value="8">Top K: 8</option>
          </select>

          <select id="modeSelect">
            <option value="answer_sources" selected>Answer + Sources</option>
            <option value="answer_only">Answer Only</option>
            <option value="sources_only">Sources Only</option>
          </select>
        </div>
      </header>

      <section id="messages" class="messages">
        <div class="empty-state">
          <div class="empty-icon">✦</div>
          <h2>ابدأ محادثة مع مكتبتك الأوفلاين</h2>
          <p>اسأل من محتوى Kiwix المفهرس عبر Qdrant و Ollama.</p>
        </div>
      </section>

      <footer class="composer">
        <textarea id="messageInput" placeholder="اكتب سؤالك عن المعرفة الأوفلاين..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn">➤</button>
      </footer>
    </main>
  </div>

  <div id="infoModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:9999;">
    <div style="
      width:min(760px, 92vw);
      max-height:80vh;
      overflow:auto;
      margin:6vh auto;
      background:#1e1a0d;
      color:#e8ddb0;
      border:1px solid rgba(201,180,88,0.25);
      border-radius:18px;
      padding:20px;
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
      direction:ltr;
    ">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px;">
        <h2 id="infoModalTitle" style="margin:0; font-size:28px;">Info</h2>
        <button id="closeInfoModalBtn" style="
          border:1px solid rgba(201,180,88,0.25);
          background:#2b2613;
          color:#e8ddb0;
          border-radius:10px;
          padding:8px 12px;
          cursor:pointer;
        ">Close</button>
      </div>

      <div id="infoModalBody"></div>
    </div>
  </div>

  <script src="/static/chat.js"></script>
</body>
</html>
